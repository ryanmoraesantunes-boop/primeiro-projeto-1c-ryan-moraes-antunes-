<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site</title>
    <style>
        header {
            background-color: #0873e6;
            color: #FFFFFF;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            border: 5px solid rgb(0, 0, 0);
        }

        main {
            background-color: #FFFFFF;
            color: #0562c5;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            display: flex;
        }

        img {
            width: 80px;
            height: 80px;
        }

        .Artigo-Autor {
            font-weight: bold;
        }
    </style>
</head>

<body>
    <header>
        <h1>Meu blog</h1>
        <p>Vou compartilhar conhecimentos sobre tecnologia e programação</p>
    </header>
    <main>
        <img src="ImgTec.png" alt="Logotipo">
        <div>
            <h2>Meu Primeiro Post</h2>
            <p class="Artigo-Autor">Por: ryan</p>
            <p>Boas-Vindas Ao Meu Novo Blog!</p>
            <button>❤️ <span>0</span></button>
            <button> 👍 <span>0</span></button>
        </div>
    </main>
</body>
<script>
    const botoes = document.querySelectorAll("button");

    botoes.forEach(function (botao) {
        botao.addEventListener("click", botaoClicado);

        function botaoClicado() {
            console.log("Botao Clicado");
            let texto = botao.querySelector("span");
            texto.textContent++;

        }

    })
</script>

</html>
