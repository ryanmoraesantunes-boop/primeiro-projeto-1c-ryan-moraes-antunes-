
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassino Royale</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a3d1a;
    color: white;
    text-align: center;
}

header {
    background: #111;
    padding: 20px;
    border-bottom: 3px solid gold;
}

h1 {
    color: gold;
    font-size: 3rem;
}

.hero {
    padding: 60px 20px;
}

.btn {
    background: gold;
    color: black;
    padding: 15px 30px;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
}

.games {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    padding: 40px;
}

.card {
    background: #1b5e20;
    padding: 20px;
    width: 220px;
    border-radius: 15px;
    box-shadow: 0 0 10px gold;
}

footer {
    background: #111;
    padding: 15px;
    margin-top: 30px;
}
</style>
</head>

<body>

<header>
    <h1>🎰 Cassino Royale 🎰</h1>
</header>

<section class="hero">
    <h2>Bem-vindo ao melhor cassino virtual!</h2>
    <p>Slots, Poker e Roleta em um ambiente elegante.</p>
    <a href="#" class="btn">Jogar Agora</a>
</section>

<section class="games">
    <div class="card">
        <h3>🎰 Slots</h3>
        <p>Tente a sorte nas máquinas caça-níqueis.</p>
    </div>

    <div class="card">
        <h3>🃏 Poker</h3>
        <p>Mostre suas habilidades nas cartas.</p>
    </div>

    <div class="card">
        <h3>🎡 Roleta</h3>
        <p>Escolha seu número favorito.</p>
    </div>
</section>

<footer>
    © 2026 Cassino Royale
</footer>

</body>
</html>
